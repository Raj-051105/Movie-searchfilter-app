<!DOCTYPE html>
<html>
<head>
    <title>Movie Explorer with Popup Trailer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎬 Movie Explorer</h1>

<input type="text" id="search" placeholder="Search movie...">

<select id="language">
<option value="">All Languages</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="hi">Hindi</option>
<option value="en">English</option>
<option value="ko">Korean</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>
</select>

<h2>🔥 Trending Movies</h2>

<div class="container" id="movies"></div>

<!-- Trailer Modal -->
<div id="trailerModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <iframe id="trailerFrame" width="800" height="450" frameborder="0" allowfullscreen></iframe>
</div>

<script src="script.js"></script>

</body>
</html>
